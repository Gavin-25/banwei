<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>班味浓度测试 | 你身上的班味有多重？</title>
<meta name="description" content="15道灵魂拷问，测出你的班味浓度。打工人必测！">
<meta property="og:title" content="班味浓度测试 — 你身上的班味有多重？">
<meta property="og:description" content="15道灵魂拷问，测出你的班味浓度等级。来测测你还剩多少自我？">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f1a;
  --card: rgba(255,255,255,0.06);
  --card-border: rgba(255,255,255,0.1);
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --accent: #7c6ff7;
  --accent-glow: rgba(124,111,247,0.3);
  /* 结果页会动态覆盖这些 */
  --result-color: #7c6ff7;
  --result-glow: rgba(124,111,247,0.3);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* 背景粒子 */
#bgCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 420px;
  margin: 0 auto;
  padding: 20px 16px 40px;
  min-height: 100vh;
}

/* ===== 开始页 ===== */
.page { display: none; }
.page.active { display: block; }

.start-page {
  text-align: center;
  padding-top: 15vh;
}

.start-icon {
  font-size: 72px;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.start-title {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, #7c6ff7, #f76f9f);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}

.start-subtitle {
  font-size: 16px;
  color: var(--text-dim);
  margin-bottom: 8px;
  line-height: 1.6;
}

.start-desc {
  font-size: 13px;
  color: var(--text-dim);
  opacity: 0.6;
  margin-bottom: 40px;
}

.btn-start {
  display: inline-block;
  padding: 16px 48px;
  background: linear-gradient(135deg, #7c6ff7, #a855f7);
  color: white;
  font-size: 18px;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 24px rgba(124,111,247,0.4);
}

.btn-start:active {
  transform: scale(0.96);
}

.btn-start::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
  animation: shimmer 3s ease-in-out infinite;
}

@keyframes shimmer {
  0%, 100% { transform: translateX(-30%) translateY(-30%); }
  50% { transform: translateX(30%) translateY(30%); }
}

.start-count {
  margin-top: 24px;
  font-size: 13px;
  color: var(--text-dim);
  opacity: 0.5;
}

/* ===== 答题页 ===== */
.quiz-header {
  text-align: center;
  margin-bottom: 24px;
}

.progress-bar-wrap {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 16px;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #7c6ff7, #f76f9f);
  border-radius: 3px;
  transition: width 0.4s ease;
}

.progress-text {
  font-size: 13px;
  color: var(--text-dim);
}

.question-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 28px 20px;
  backdrop-filter: blur(10px);
  animation: cardIn 0.4s ease;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.q-dimension {
  display: inline-block;
  padding: 4px 12px;
  background: rgba(124,111,247,0.15);
  color: #a99ff7;
  font-size: 12px;
  border-radius: 20px;
  margin-bottom: 16px;
}

.q-text {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 24px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: block;
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  color: var(--text);
  font-size: 15px;
  line-height: 1.4;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s ease;
}

.option-btn:active {
  transform: scale(0.98);
  background: rgba(124,111,247,0.15);
  border-color: rgba(124,111,247,0.3);
}

.option-btn .opt-label {
  display: inline-block;
  width: 22px;
  height: 22px;
  line-height: 22px;
  text-align: center;
  background: rgba(124,111,247,0.2);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  color: #a99ff7;
  margin-right: 10px;
  flex-shrink: 0;
}

/* ===== 加载页 ===== */
.loading-page {
  text-align: center;
  padding-top: 25vh;
}

.loading-beaker {
  font-size: 80px;
  margin-bottom: 24px;
  animation: bubble 2s ease-in-out infinite;
}

@keyframes bubble {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.05) rotate(-5deg); }
  75% { transform: scale(1.05) rotate(5deg); }
}

.loading-text {
  font-size: 16px;
  color: var(--text-dim);
  margin-bottom: 24px;
  min-height: 24px;
}

.loading-progress {
  width: 200px;
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
  margin: 0 auto;
}

.loading-progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #7c6ff7, #f76f9f);
  border-radius: 4px;
  transition: width 0.3s ease;
}

/* ===== 结果页 ===== */
.result-page { padding-top: 20px; }

.result-header {
  text-align: center;
  margin-bottom: 28px;
}

.result-badge {
  display: inline-block;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, var(--result-glow), transparent 70%);
  border: 3px solid var(--result-color);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  position: relative;
  box-shadow: 0 0 40px var(--result-glow);
}

.result-badge-inner {
  text-align: center;
}

.result-percent {
  font-size: 36px;
  font-weight: 900;
  color: var(--result-color);
}

.result-percent-sign {
  font-size: 16px;
  font-weight: 400;
}

.result-badge-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

.result-title {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 8px;
}

.result-level-tag {
  display: inline-block;
  padding: 6px 16px;
  background: var(--result-glow);
  color: var(--result-color);
  font-size: 14px;
  font-weight: 600;
  border-radius: 20px;
  border: 1px solid var(--result-color);
}

/* 结果描述卡 */
.result-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 24px 20px;
  margin-bottom: 16px;
  backdrop-filter: blur(10px);
}

.result-card-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.result-desc {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-dim);
}

/* 五维雷达 - 用条形替代 */
.dimension-bars {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.dim-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.dim-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dim-name {
  font-size: 14px;
  font-weight: 600;
}

.dim-score {
  font-size: 13px;
  color: var(--result-color);
  font-weight: 700;
}

.dim-bar {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
}

.dim-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--result-color), var(--result-glow));
  width: 0%;
  transition: width 1s ease;
}

.dim-tip {
  font-size: 12px;
  color: var(--text-dim);
  opacity: 0.7;
}

/* 症状列表 */
.symptom-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.symptom-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-dim);
}

.symptom-icon {
  flex-shrink: 0;
  font-size: 16px;
}

/* 处方 */
.prescription {
  background: rgba(124,111,247,0.08);
  border: 1px dashed rgba(124,111,247,0.3);
  border-radius: 14px;
  padding: 16px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-dim);
}

.prescription-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

/* 按钮组 */
.result-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 24px;
}

.btn-share {
  display: block;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--result-color), #f76f9f);
  color: white;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: transform 0.2s;
  box-shadow: 0 4px 20px var(--result-glow);
}

.btn-share:active { transform: scale(0.97); }

.btn-retry {
  display: block;
  width: 100%;
  padding: 14px;
  background: transparent;
  color: var(--text-dim);
  font-size: 15px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-retry:active {
  background: rgba(255,255,255,0.05);
}

/* 海报弹窗 */
.poster-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 20px;
}

.poster-overlay.show {
  display: flex;
}

.poster-canvas-wrap {
  max-width: 340px;
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.poster-canvas-wrap canvas {
  width: 100%;
  display: block;
}

.poster-tip {
  color: rgba(255,255,255,0.6);
  font-size: 14px;
  margin-top: 16px;
  text-align: center;
}

.poster-close {
  margin-top: 16px;
  padding: 10px 32px;
  background: rgba(255,255,255,0.1);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
}

/* footer */
.footer {
  text-align: center;
  padding: 24px 0;
  font-size: 12px;
  color: var(--text-dim);
  opacity: 0.3;
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="container">

  <!-- ===== 开始页 ===== -->
  <div class="page active" id="startPage">
    <div class="start-page">
      <div class="start-icon">🧪</div>
      <div class="start-title">班味浓度测试</div>
      <div class="start-subtitle">你身上的班味，到底有多重？</div>
      <div class="start-desc">15 道灵魂拷问 · 5 大维度检测 · 6 档浓度分级</div>
      <button class="btn-start" onclick="startQuiz()">开始检测 💉</button>
      <div class="start-count" id="startCount"></div>
    </div>
  </div>

  <!-- ===== 答题页 ===== -->
  <div class="page" id="quizPage">
    <div class="quiz-header">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">1 / 15</div>
    </div>
    <div class="question-card" id="questionCard">
      <div class="q-dimension" id="qDimension"></div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>
  </div>

  <!-- ===== 加载页 ===== -->
  <div class="page" id="loadingPage">
    <div class="loading-page">
      <div class="loading-beaker">🧬</div>
      <div class="loading-text" id="loadingText">正在提取你的班味样本...</div>
      <div class="loading-progress">
        <div class="loading-progress-fill" id="loadingFill"></div>
      </div>
    </div>
  </div>

  <!-- ===== 结果页 ===== -->
  <div class="page" id="resultPage">
    <div class="result-page">
      <div class="result-header">
        <div class="result-badge">
          <div class="result-badge-inner">
            <div class="result-percent" id="resultPercent">0<span class="result-percent-sign">%</span></div>
            <div class="result-badge-label">班味浓度</div>
          </div>
        </div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-level-tag" id="resultTag"></div>
      </div>

      <div class="result-card">
        <div class="result-card-title">📋 检测报告</div>
        <div class="result-desc" id="resultDesc"></div>
      </div>

      <div class="result-card">
        <div class="result-card-title">📊 五维班味分析</div>
        <div class="dimension-bars" id="dimBars"></div>
      </div>

      <div class="result-card">
        <div class="result-card-title">🔍 典型症状</div>
        <div class="symptom-list" id="symptomList"></div>
      </div>

      <div class="result-card">
        <div class="result-card-title">💊 医嘱处方</div>
        <div class="prescription" id="prescription"></div>
      </div>

      <div class="result-actions">
        <button class="btn-share" onclick="generatePoster()">📤 生成报告海报</button>
        <button class="btn-retry" onclick="retry()">🔄 重新检测</button>
      </div>

      <div class="footer">班味浓度测试 · 纯属娱乐 · 如有雷同说明你班味太重了</div>
    </div>
  </div>

</div>

<!-- 海报弹窗 -->
<div class="poster-overlay" id="posterOverlay">
  <div class="poster-canvas-wrap">
    <canvas id="posterCanvas"></canvas>
  </div>
  <div class="poster-tip">📲 长按图片保存，发给同事一起测！</div>
  <button class="poster-close" onclick="closePoster()">关闭</button>
</div>

<script>
// ===== 题库 =====
const questions = [
  // 🕐 时间感知 (3题)
  {
    dimension: '🕐 时间感知',
    dimKey: 'time',
    text: '周日晚上，你通常是什么状态？',
    options: [
      { text: '该干嘛干嘛，明天上班就上班呗', score: 1 },
      { text: '有一点点焦虑，但还好', score: 3 },
      { text: '从下午就开始emo，感觉快乐被偷走了', score: 5 },
      { text: '已经在回复工作消息了', score: 7 }
    ]
  },
  {
    dimension: '🕐 时间感知',
    dimKey: 'time',
    text: '你觉得一周里哪天过得最快？',
    options: [
      { text: '每天都差不多', score: 1 },
      { text: '周末过得快', score: 3 },
      { text: '只有周五下午快', score: 5 },
      { text: '周一到周四是一个世纪，周五到周日是一秒钟', score: 7 }
    ]
  },
  {
    dimension: '🕐 时间感知',
    dimKey: 'time',
    text: '你的身体在几点会自动醒来？',
    options: [
      { text: '睡到自然醒，每天不一样', score: 1 },
      { text: '闹钟响了才醒', score: 3 },
      { text: '闹钟还没响就醒了，多年养成的习惯', score: 5 },
      { text: '凌晨3点醒一次想工作的事，然后闹钟前5分钟再醒一次', score: 7 }
    ]
  },
  // 💬 语言系统 (3题)
  {
    dimension: '💬 语言系统',
    dimKey: 'language',
    text: '朋友约你吃饭，你会怎么回复？',
    options: [
      { text: '"好啊！去哪吃？"', score: 1 },
      { text: '"收到，我看看时间"', score: 3 },
      { text: '"这个事情我们先对齐一下时间"', score: 5 },
      { text: '"好的，我先拉个群，明确一下参会人员和议程"', score: 7 }
    ]
  },
  {
    dimension: '💬 语言系统',
    dimKey: 'language',
    text: '聊天时你最常说的口头禅是？',
    options: [
      { text: '"哈哈哈" / "真的假的"', score: 1 },
      { text: '"OK" / "收到" / "了解"', score: 3 },
      { text: '"我跟进一下" / "拉齐认知" / "赋能"', score: 5 },
      { text: '"我们复盘一下" / "抓手在哪" / "颗粒度不够"', score: 7 }
    ]
  },
  {
    dimension: '💬 语言系统',
    dimKey: 'language',
    text: '发微信时，你的标点符号习惯是？',
    options: [
      { text: '正常用标点，偶尔加表情', score: 1 },
      { text: '句尾必须加"～"或者"哈哈"缓解气氛', score: 3 },
      { text: '每句话都用句号结尾。显得专业。', score: 5 },
      { text: '"收到。" "好的。" "辛苦。" 精准且冷漠', score: 7 }
    ]
  },
  // 🧠 思维模式 (3题)
  {
    dimension: '🧠 思维模式',
    dimKey: 'thinking',
    text: '路上看到一个好看的店，你的第一反应是？',
    options: [
      { text: '"好好看，进去逛逛"', score: 1 },
      { text: '"装修不错，生意应该可以"', score: 3 },
      { text: '"这个选址思路可以借鉴，用户画像应该是..."', score: 5 },
      { text: '"品牌定位→目标人群→获客成本→坪效→商业模式..."（脑子自动出PPT）', score: 7 }
    ]
  },
  {
    dimension: '🧠 思维模式',
    dimKey: 'thinking',
    text: '朋友跟你吐槽感情问题，你会？',
    options: [
      { text: '认真倾听，安慰TA', score: 1 },
      { text: '分析问题出在哪，给建议', score: 3 },
      { text: '不自觉地开始用"第一、第二、第三"列点分析', score: 5 },
      { text: '"你这个问题本质上是预期管理没做好，建议你们开个复盘会"', score: 7 }
    ]
  },
  {
    dimension: '🧠 思维模式',
    dimKey: 'thinking',
    text: '看到"复盘"这两个字，你的反应是？',
    options: [
      { text: '想到下棋复盘', score: 1 },
      { text: '想到年终总结', score: 3 },
      { text: '下意识想找个文档模板', score: 5 },
      { text: '头皮发麻，PTSD发作', score: 7 }
    ]
  },
  // 😴 能量状态 (3题)
  {
    dimension: '😴 能量状态',
    dimKey: 'energy',
    text: '你一天中最清醒的时刻是？',
    options: [
      { text: '早上起来精神就很好', score: 1 },
      { text: '午饭后需要缓一缓，但总体OK', score: 3 },
      { text: '只有快下班的时候突然清醒', score: 5 },
      { text: '上班八小时都是半梦半醒，回家反而精神了', score: 7 }
    ]
  },
  {
    dimension: '😴 能量状态',
    dimKey: 'energy',
    text: '放假第一天你会做什么？',
    options: [
      { text: '出去玩！浪起来！', score: 1 },

// ===== 背景动画 =====
function initBg() {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 0.5,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      alpha: Math.random() * 0.4 + 0.1
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(124,111,247,${p.alpha})`;
      ctx.fill();
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ===== 开始答题 =====
function startQuiz() {
  currentQ = 0;
  answers = [];
  dimScores = { time: 0, language: 0, thinking: 0, energy: 0, social: 0 };
  totalScore = 0;
  showPage('quizPage');
  renderQuestion();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('progressFill').style.width = ((currentQ + 1) / questions.length * 100) + '%';
  document.getElementById('progressText').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('qDimension').textContent = q.dimension;
  document.getElementById('qText').textContent = q.text;

  const wrap = document.getElementById('optionsWrap');
  // 重新创建以触发动画
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight; // 强制 reflow
  card.style.animation = 'cardIn 0.4s ease';

  const labels = ['A', 'B', 'C', 'D'];
  // 随机打乱选项顺序
  const shuffled = q.options.map((o, i) => ({ ...o, origIdx: i }));
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  wrap.innerHTML = shuffled.map((opt, i) => `
    <button class="option-btn" onclick="selectOption('${q.dimKey}', ${opt.score})">
      <span class="opt-label">${labels[i]}</span>${opt.text}
    </button>
  `).join('');
}

function selectOption(dimKey, score) {
  answers.push({ dimKey, score });
  dimScores[dimKey] += score;

  currentQ++;
  if (currentQ < questions.length) {
    renderQuestion();
  } else {
    showLoading();
  }
}

// ===== 加载动画 =====
function showLoading() {
  showPage('loadingPage');
  const texts = [
    '正在提取你的班味样本...',
    '分析你的职场语言污染程度...',
    '检测你的生物钟扭曲度...',
    '评估你的社交面具厚度...',
    '计算你的灵魂含班量...',
    '生成你的班味浓度报告...'
  ];
  let step = 0;
  const fill = document.getElementById('loadingFill');
  const text = document.getElementById('loadingText');

  const interval = setInterval(() => {
    step++;
    fill.style.width = (step / texts.length * 100) + '%';
    if (step < texts.length) {
      text.textContent = texts[step];
    }
    if (step >= texts.length) {
      clearInterval(interval);
      setTimeout(showResult, 400);
    }
  }, 600);
}

// ===== 显示结果 =====
function showResult() {
  // 计算总分 (满分 105 = 15题 × 7分)
  const rawTotal = Object.values(dimScores).reduce((a, b) => a + b, 0);
  const maxTotal = questions.length * 7;
  totalScore = Math.round(rawTotal / maxTotal * 100);

  // 找到对应等级
  const level = levels.find(l => totalScore >= l.min && totalScore <= l.max) || levels[levels.length - 1];

  // 设置主题色
  document.documentElement.style.setProperty('--result-color', level.color);
  document.documentElement.style.setProperty('--result-glow', level.glow);

  // 渲染头部
  document.getElementById('resultPercent').innerHTML = `${totalScore}<span class="result-percent-sign">%</span>`;
  document.getElementById('resultTitle').textContent = `${level.emoji} ${level.title}`;
  document.getElementById('resultTag').textContent = level.tag;
  document.getElementById('resultDesc').textContent = level.desc;

  // 渲染五维
  const dimHTML = Object.keys(dimensions).map(key => {
    const maxDim = 21; // 3题 × 7分
    const pct = Math.round(dimScores[key] / maxDim * 100);
    const tipIdx = pct <= 25 ? 0 : pct <= 50 ? 1 : pct <= 75 ? 2 : 3;
    return `
      <div class="dim-item">
        <div class="dim-label">
          <span class="dim-name">${dimensions[key].name}</span>
          <span class="dim-score">${pct}%</span>
        </div>
        <div class="dim-bar">
          <div class="dim-bar-fill" data-width="${pct}"></div>
        </div>
        <div class="dim-tip">${dimTips[key][tipIdx]}</div>
      </div>
    `;
  }).join('');
  document.getElementById('dimBars').innerHTML = dimHTML;

  // 渲染症状
  document.getElementById('symptomList').innerHTML = level.symptoms.map(s =>
    `<div class="symptom-item"><span class="symptom-icon">•</span><span>${s}</span></div>`
  ).join('');

  // 渲染处方
  document.getElementById('prescription').innerHTML = `
    <div class="prescription-title">📋 诊断结果：班味浓度 ${totalScore}%</div>
    ${level.prescription}
  `;

  showPage('resultPage');

  // 动画条形图
  setTimeout(() => {
    document.querySelectorAll('.dim-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.width + '%';
      bar.style.background = `linear-gradient(90deg, ${level.color}, ${level.glow})`;
    });
  }, 200);
}

// ===== 生成海报 =====
function generatePoster() {
  const level = levels.find(l => totalScore >= l.min && totalScore <= l.max) || levels[levels.length - 1];
  const canvas = document.getElementById('posterCanvas');
  const ctx = canvas.getContext('2d');
  const W = 750, H = 1334;
  canvas.width = W;
  canvas.height = H;

  // 背景
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0f0f1a');
  bgGrad.addColorStop(0.5, '#1a1a2e');
  bgGrad.addColorStop(1, '#0f0f1a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // 星星
  for (let i = 0; i < 80; i++) {
    ctx.beginPath();
    ctx.arc(Math.random() * W, Math.random() * H, Math.random() * 2 + 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(124,111,247,${Math.random() * 0.3 + 0.05})`;
    ctx.fill();
  }

  // 光晕
  const glowGrad = ctx.createRadialGradient(W / 2, 350, 0, W / 2, 350, 250);
  glowGrad.addColorStop(0, level.glow);
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 100, W, 500);

  // 标题
  ctx.textAlign = 'center';
  ctx.font = '700 32px -apple-system, sans-serif';
  ctx.fillStyle = '#ffffff88';
  ctx.fillText('🧪 班味浓度测试', W / 2, 100);

  // emoji
  ctx.font = '100px -apple-system, sans-serif';
  ctx.fillText(level.emoji, W / 2, 260);

  // 浓度圆环
  ctx.beginPath();
  ctx.arc(W / 2, 420, 100, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 8;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(W / 2, 420, 100, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * totalScore / 100));
  ctx.strokeStyle = level.color;
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.stroke();

  ctx.font = '900 56px -apple-system, sans-serif';
  ctx.fillStyle = level.color;
  ctx.fillText(`${totalScore}%`, W / 2, 435);

  ctx.font = '400 16px -apple-system, sans-serif';
  ctx.fillStyle = '#ffffff66';
  ctx.fillText('班味浓度', W / 2, 465);

  // 称号
  ctx.font = '800 40px -apple-system, sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(level.title, W / 2, 560);

  ctx.font = '600 18px -apple-system, sans-serif';
  ctx.fillStyle = level.color;
  ctx.fillText(level.tag, W / 2, 600);

  // 五维数据
  const dimKeys = Object.keys(dimensions);
  const startY = 670;
  dimKeys.forEach((key, i) => {
    const y = startY + i * 60;
    const pct = Math.round(dimScores[key] / 21 * 100);

    ctx.textAlign = 'left';
    ctx.font = '600 18px -apple-system, sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(dimensions[key].name, 80, y);

    ctx.textAlign = 'right';
    ctx.fillStyle = level.color;
    ctx.fillText(`${pct}%`, W - 80, y);

    // 条
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath();
    ctx.roundRect(80, y + 10, W - 160, 8, 4);
    ctx.fill();

    ctx.fillStyle = level.color;
    ctx.beginPath();
    ctx.roundRect(80, y + 10, (W - 160) * pct / 100, 8, 4);
    ctx.fill();
  });

  // 分割线
  const lineY = startY + dimKeys.length * 60 + 20;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(80, lineY);
  ctx.lineTo(W - 80, lineY);
  ctx.stroke();

  // 处方摘要
  ctx.textAlign = 'center';
  ctx.font = '700 20px -apple-system, sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('💊 医嘱', W / 2, lineY + 50);

  ctx.font = '400 16px -apple-system, sans-serif';
  ctx.fillStyle = '#ffffff88';
  const prescText = level.prescription.slice(0, 50) + '...';
  wrapText(ctx, prescText, W / 2, lineY + 85, W - 160, 24);

  // 底部
  ctx.font = '400 16px -apple-system, sans-serif';
  ctx.fillStyle = '#ffffff33';
  ctx.fillText('扫码测测你的班味浓度 👆', W / 2, H - 80);

  ctx.font = '400 13px -apple-system, sans-serif';
  ctx.fillStyle = '#ffffff22';
  ctx.fillText('班味浓度测试 · 纯属娱乐', W / 2, H - 50);

  // 显示
  document.getElementById('posterOverlay').classList.add('show');
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  let line = '';
  const chars = text.split('');
  for (let i = 0; i < chars.length; i++) {
    const test = line + chars[i];
    if (ctx.measureText(test).width > maxW && line.length > 0) {
      ctx.fillText(line, x, y);
      line = chars[i];
      y += lineH;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, y);
}

function closePoster() {
  document.getElementById('posterOverlay').classList.remove('show');
}

// ===== 初始化 =====
initBg();
initCount();
</script>
